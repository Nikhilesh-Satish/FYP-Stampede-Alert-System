tracker_type: bytetrack

# Drone + dense crowd tuned settings:
# - lower thresholds keep tiny detections alive
# - larger buffer preserves IDs across missed frames
# - higher match threshold improves continuity on moving cameras
track_high_thresh: 0.25
track_low_thresh: 0.05
new_track_thresh: 0.20
track_buffer: 90
match_thresh: 0.92
fuse_score: true
